services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: safestaff-backend
    ports:
      - "5000:5000"
    environment:
      HOST: 0.0.0.0
      PORT: 5000
      FLASK_DEBUG: "false"
    volumes:
      - ./database:/app/database
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: safestaff-frontend
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://backend:5000
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      STREAMLIT_SERVER_PORT: 8501
    depends_on:
      backend:
        condition: service_healthy
